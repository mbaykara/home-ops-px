name: Bootstrap Talos Cluster

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - create-cluster
          - destroy-cluster

jobs:
  terraform:
    name: Terraform - Manage Cluster
    runs-on: self-hosted
    if: inputs.action == 'create-cluster' || inputs.action == 'destroy-cluster'
    defaults:
      run:
        working-directory: terraform
    env:
      GH_TOKEN: ${{ secrets.PA_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Create terraform.tfvars
        env:
          TF_VAR_PROXMOX_ENDPOINT: ${{ secrets.TF_VAR_PROXMOX_ENDPOINT }}
          TF_VAR_PROXMOX_USERNAME: ${{ secrets.TF_VAR_PROXMOX_USERNAME }}
          TF_VAR_PROXMOX_PASSWORD: ${{ secrets.TF_VAR_PROXMOX_PASSWORD }}
          PA_TOKEN: ${{ secrets.PA_TOKEN }}
        run: |
          cat > terraform.tfvars <<EOF
          proxmox_endpoint = "${TF_VAR_PROXMOX_ENDPOINT}"
          proxmox_username = "${TF_VAR_PROXMOX_USERNAME}"
          proxmox_password = "${TF_VAR_PROXMOX_PASSWORD}"
          proxmox_insecure = true

          cluster_name = "talos-proxmox-cluster"

          control_plane_nodes = {
            "talos-cp-01" = {
              vm_id     = 800
              cores     = 2
              memory    = 4096
              disk_size = 20
            }
          }

          worker_nodes = {
            "talos-worker-01" = {
              vm_id     = 801
              cores     = 2
              memory    = 4096
              disk_size = 20
            }
          }

          flux_github_repo = "https://github.com/mbaykara/home-ops-px.git"
          github_token     = "${PA_TOKEN}"
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: inputs.action == 'create-cluster'
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: inputs.action == 'create-cluster'
        run: terraform apply -auto-approve tfplan

      - name: Upload kubeconfig
        if: inputs.action == 'create-cluster'
        uses: actions/upload-artifact@v4
        with:
          name: cluster-configs
          path: |
            terraform/generated/kubeconfig
            terraform/generated/talosconfig
          retention-days: 1

      - name: Terraform Destroy
        if: inputs.action == 'destroy-cluster'
        run: terraform destroy -auto-approve
