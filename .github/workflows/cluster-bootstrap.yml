name: Bootstrap Talos Cluster

on:
  workflow_dispatch:  # Manual trigger only for safety
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - create-cluster
          - destroy-cluster

jobs:
  terraform:
    name: Terraform - Manage Cluster
    runs-on: self-hosted  # Use self-hosted runner on your network
    if: inputs.action == 'create-cluster' || inputs.action == 'destroy-cluster'

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false  # Important for output parsing

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          proxmox_endpoint = "${{ secrets.TF_VAR_PROXMOX_ENDPOINT }}"
          proxmox_username = "${{ secrets.TF_VAR_PROXMOX_USERNAME }}"
          proxmox_password = "${{ secrets.TF_VAR_PROXMOX_PASSWORD }}"
          proxmox_insecure = true
          proxmox_content_type = "iso"
          proxmox_datastore_id = "local"
          proxmox_node_name = "pve"
          proxmox_vm_id = 800
          proxmox_vm_name = "talos-cp-01"
          proxmox_cpu_cores = 2
          proxmox_cpu_type = "host"
          proxmox_disk_file_format = "raw"
          proxmox_disk_interface = "virtio0"
          proxmox_disk_size = 20
          proxmox_network_bridge = "vmbr0"
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: inputs.action == 'create-cluster'
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: inputs.action == 'create-cluster'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: inputs.action == 'destroy-cluster'
        run: terraform destroy -auto-approve -refresh=false

      
      - name: Summary
        if: inputs.action == 'create-cluster'
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## 🎉 Talos Kubernetes Cluster Created!

          **Control Plane IP:** ${{ steps.creds.outputs.control_plane_ip }}
          **Worker IP:** ${{ steps.creds.outputs.worker_ip }}

          ### Verify Cluster

          \`\`\`bash
          export KUBECONFIG=./terraform/generated/kubeconfig
          kubectl get nodes
          kubectl get pods -A
          \`\`\`

          ### Credentials

          Stored in GitHub Secrets:
          - \`KUBE_CONFIG\` - Base64 encoded kubeconfig
          - \`TALOS_CONFIG\` - Base64 encoded talosconfig
          - \`CONTROL_PLANE_IP\` - ${{ steps.creds.outputs.control_plane_ip }}
          - \`WORKER_IP\` - ${{ steps.creds.outputs.worker_ip }}
          EOF
