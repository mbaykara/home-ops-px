---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
  namespace: opentelemetry
spec:
  interval: 1h
  chart:
    spec:
      chart: opentelemetry-operator
      version: "0.*"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    manager:
      collectorImage:
        repository: otel/opentelemetry-collector-contrib
    admissionWebhooks:
      certManager:
        enabled: true
