---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-demo
  namespace: otel-demo
spec:
  interval: 1h
  chart:
    spec:
      chart: opentelemetry-demo
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    default:
      envOverrides:
      - name: OTEL_COLLECTOR_NAME
        value: grafana-k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: "service.namespace=default"
    # Disable all bundled observability backends -- use existing monitoring stack
    opensearch:
      enabled: false
    grafana:
      enabled: false
    prometheus:
      enabled: false
    jaeger:
      enabled: false
