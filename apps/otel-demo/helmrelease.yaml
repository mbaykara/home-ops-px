---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-demo
  namespace: otel-demo
spec:
  interval: 1h
  chart:
    spec:
      chart: opentelemetry-demo
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Disable all bundled observability backends -- use existing monitoring stack
    opensearch:
      enabled: false
    grafana:
      enabled: false
    prometheus:
      enabled: false
    jaeger:
      enabled: false

    # Configure the bundled collector to export to existing Alloy receiver
    opentelemetry-collector:
      enabled: true
      config:
        exporters:
          otlp:
            endpoint: alloy-receiver.monitoring.svc.cluster.local:4317
            tls:
              insecure: true
        service:
          pipelines:
            traces:
              exporters: [otlp]
            metrics:
              exporters: [otlp]
            logs:
              exporters: [otlp]
