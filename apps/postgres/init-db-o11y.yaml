---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-db-o11y
  namespace: postgres
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-pg
          image: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-rw.postgres.svc.cluster.local -p 5432 -U app; do
                echo "Waiting for PostgreSQL..."
                sleep 5
              done
      containers:
        - name: init-o11y
          image: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-superuser
                  key: password
          command:
            - psql
            - -h
            - postgres-rw.postgres.svc.cluster.local
            - -U
            - app
            - -d
            - app
            - -c
            - |
              CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
              DO $$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'db-o11y') THEN
                  CREATE USER "db-o11y" WITH PASSWORD 'changeme-o11y';
                END IF;
              END
              $$;
              GRANT pg_monitor TO "db-o11y";
              GRANT pg_read_all_stats TO "db-o11y";
              GRANT USAGE ON SCHEMA public TO "db-o11y";
              GRANT SELECT ON ALL TABLES IN SCHEMA public TO "db-o11y";
